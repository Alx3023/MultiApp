<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SANDRO MULTIAPP PRO</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&family=Space+Mono&family=Bebas+Neue&family=Audiowide&family=Major+Mono+Display&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  --font-display:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  --scale:1;
  --accent:#4ade80;
  --glass:rgba(255,255,255,.12);
  --border:rgba(255,255,255,.2)
}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font);color:#fff;user-select:none;background:#000}
.bg-gradient{position:fixed;inset:0;z-index:-3;background-image:linear-gradient(135deg,#667eea,#764ba2);background-size:400% 400%;animation:bgShift 20s ease infinite}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.bg-image{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;opacity:0;transition:opacity .6s}
.bg-image.visible{opacity:1}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 16px}
.app-logo{width:52px;height:52px;flex-shrink:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(102,126,234,.5),0 0 0 2px rgba(255,255,255,.15);position:relative;overflow:hidden;animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{transform:scale(1);box-shadow:0 8px 24px rgba(102,126,234,.5),0 0 0 2px rgba(255,255,255,.15)}50%{transform:scale(1.06);box-shadow:0 12px 32px rgba(240,147,251,.7),0 0 0 3px rgba(255,255,255,.25)}}
.app-logo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4) 0%,transparent 50%)}
.app-logo svg{width:30px;height:30px;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.header-text{text-align:left}
.app-title{font-family:var(--font-display);font-size:calc(20px * var(--scale));font-weight:800;letter-spacing:2.5px;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,#4ade80 40%,#22d3ee 70%,#fff 100%);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:titleGradient 4s ease infinite;line-height:1.1}
@keyframes titleGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.app-subtitle{font-family:var(--font);font-size:calc(9px * var(--scale));color:rgba(255,255,255,.7);letter-spacing:3px;text-transform:uppercase;font-weight:500;margin-top:2px}

.main{position:fixed;inset:0;padding:8px 14px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

/* OROLOGIO GIGANTE 130px */
.clock-area{text-align:center;margin:8px 0}
.date{font-family:var(--font);font-size:calc(17px * var(--scale));font-weight:500;letter-spacing:1.5px;text-transform:capitalize;opacity:.95;margin-bottom:4px}
.time{font-family:var(--font-display);font-size:calc(130px * var(--scale));font-weight:200;letter-spacing:-6px;line-height:.95;text-shadow:0 4px 40px rgba(0,0,0,.4);transition:all .3s;font-feature-settings:'ss01','cv02','cv11'}
.time.s-minimal{font-weight:100;letter-spacing:-4px;font-size:calc(105px * var(--scale))}
.time.s-bold{font-weight:800;letter-spacing:-4px;font-size:calc(120px * var(--scale));font-family:var(--font-display)}
.time.s-orbitron{font-family:'Orbitron',monospace;letter-spacing:4px;font-size:calc(64px * var(--scale));text-shadow:0 0 25px var(--accent),0 4px 30px rgba(0,0,0,.5)}
.time.s-neon{font-family:'Audiowide',sans-serif;font-size:calc(85px * var(--scale));text-shadow:0 0 5px #fff,0 0 10px #fff,0 0 25px var(--accent),0 0 50px var(--accent);animation:neonFlicker 3s infinite}
@keyframes neonFlicker{0%,100%{opacity:1}50%{opacity:.85}}
.time.s-retro{font-family:'Major Mono Display',monospace;font-size:calc(58px * var(--scale));letter-spacing:4px;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.time.s-serif{font-family:'Playfair Display',serif;font-weight:400;font-size:calc(110px * var(--scale));letter-spacing:-4px;font-style:italic}
.time.s-mono{font-family:'Space Mono',monospace;font-size:calc(75px * var(--scale));letter-spacing:2px}
.colon{animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}

.analog-clock{width:170px;height:170px;margin:8px auto;position:relative;border-radius:50%;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:2px solid rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.3);display:none}
.analog-clock.active{display:block}
.analog-clock .mark{position:absolute;width:2px;height:10px;background:rgba(255,255,255,.6);top:8px;left:50%;transform-origin:50% 77px}
.analog-clock .mark.major{height:14px;width:3px;background:#fff}
.analog-clock .hand{position:absolute;bottom:50%;left:50%;transform-origin:50% 100%;background:#fff;border-radius:2px}
.analog-clock .hand.h-hour{width:4px;height:42px;margin-left:-2px}
.analog-clock .hand.h-min{width:3px;height:58px;margin-left:-1.5px}
.analog-clock .hand.h-sec{width:1.5px;height:68px;margin-left:-.75px;background:var(--accent)}
.analog-clock .center{position:absolute;width:10px;height:10px;background:var(--accent);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}

.flip-clock{display:none;justify-content:center;gap:6px;margin:12px 0}
.flip-clock.active{display:flex}
.flip-unit{background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border-radius:10px;padding:8px 12px;min-width:52px;text-align:center;border:1px solid rgba(255,255,255,.15);position:relative;overflow:hidden}
.flip-unit::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,0,0,.5)}
.flip-num{font-family:var(--font-display);font-size:calc(32px * var(--scale));font-weight:700;color:var(--accent);text-shadow:0 0 10px var(--accent)}
.flip-label{font-family:var(--font);font-size:9px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:1px}

/* METEO */
.weather-card{background:var(--glass);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.3);margin:10px 0}
.weather-city-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.weather-city{font-family:var(--font-display);font-size:calc(30px * var(--scale));font-weight:700;letter-spacing:.5px;text-shadow:0 2px 15px rgba(0,0,0,.4)}
.weather-icon-small{font-size:calc(40px * var(--scale));filter:drop-shadow(0 2px 10px rgba(0,0,0,.3));animation:weatherFloat 3s ease-in-out infinite}
@keyframes weatherFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.weather-main{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}
.temp{font-family:var(--font-display);font-size:calc(72px * var(--scale));font-weight:200;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.desc{font-family:var(--font);font-size:calc(18px * var(--scale));color:rgba(255,255,255,.85);text-transform:capitalize;font-weight:500}
.weather-details{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.2)}
.detail{display:flex;flex-direction:column;align-items:center;font-size:calc(14px * var(--scale));gap:4px}
.detail-icon{font-size:calc(26px * var(--scale))}
.detail-value{font-family:var(--font-display);font-weight:700;font-size:calc(16px * var(--scale))}
.detail-label{font-family:var(--font);font-size:calc(10px * var(--scale));opacity:.7}

/* WIDGET */
.widgets-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
.widget-btn{aspect-ratio:1;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:#fff;font-family:inherit;transition:transform .15s,background .2s;position:relative;overflow:hidden}
.widget-btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.2),transparent 60%);pointer-events:none}
.widget-btn:active{transform:scale(.92);background:rgba(255,255,255,.25)}
.widget-btn .w-icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
.widget-btn .w-icon svg,.widget-btn .w-icon img{width:100%;height:100%;object-fit:contain}
.widget-btn .w-label{font-family:var(--font);font-size:calc(10px * var(--scale));font-weight:600;opacity:.95;text-align:center;line-height:1.1;letter-spacing:.3px}
.widget-btn.has-custom{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{width:100%;max-width:500px;max-height:88vh;background:rgba(25,25,35,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,.2);display:flex;flex-direction:column;animation:slideUp .4s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.15)}
.modal-header h3{font-family:var(--font-display);font-size:calc(17px * var(--scale));font-weight:600}
.modal-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px;scrollbar-width:none}
.modal-body::-webkit-scrollbar{display:none}

.settings-section{background:rgba(255,255,255,.08);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,.1)}
.section-title{font-family:var(--font-display);display:flex;align-items:center;gap:8px;font-size:calc(14px * var(--scale));font-weight:600;margin-bottom:10px}
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.font-btn{font-family:var(--font);padding:10px 6px;background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:10px;color:white;cursor:pointer;text-align:center;font-size:calc(13px * var(--scale))}
.font-btn.active{border-color:var(--accent);background:rgba(74,222,128,.2)}
.font-btn .font-name{font-size:calc(10px * var(--scale));opacity:.7;display:block;margin-top:2px}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:3px;outline:none;margin:10px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer}
.style-options{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.style-btn{font-family:var(--font);padding:10px;background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:10px;color:white;cursor:pointer;font-size:calc(12px * var(--scale))}
.style-btn.active{border-color:var(--accent);background:rgba(74,222,128,.2)}
.bg-options{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.bg-opt{aspect-ratio:1;border-radius:10px;border:3px solid transparent;cursor:pointer}
.bg-opt.active{border-color:white;transform:scale(1.05)}
.upload-bg-btn{font-family:var(--font);width:100%;padding:10px;background:rgba(255,255,255,.08);border:1px dashed rgba(255,255,255,.3);border-radius:10px;color:white;cursor:pointer;font-size:calc(12px * var(--scale));margin-top:6px}

.big-display{font-family:var(--font-display);font-size:52px;font-weight:200;text-align:center;padding:16px 0;letter-spacing:2px}
.big-display .sub{font-size:28px;opacity:.6}
.btn-row{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.big-btn{font-family:var(--font);padding:12px 24px;border-radius:30px;border:none;font-size:14px;font-weight:600;cursor:pointer;color:white}
.big-btn.primary{background:var(--accent)}
.big-btn.danger{background:#ef4444}
.big-btn.secondary{background:rgba(255,255,255,.2)}
.list-item{background:rgba(255,255,255,.08);border-radius:10px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.list-item .content{flex:1;font-family:var(--font);font-size:13px;line-height:1.4}
.list-item .time{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px}
.del-btn{background:rgba(239,68,68,.2);border:none;color:#ef4444;width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0}
.input-area{display:flex;gap:8px;margin-top:10px}
.input-area input,.input-area textarea,.input-area select{font-family:var(--font);flex:1;padding:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:white;font-size:13px;resize:none;min-height:40px}
.input-area button{font-family:var(--font);padding:0 16px;background:var(--accent);border:none;border-radius:10px;color:white;font-weight:600;cursor:pointer}
.info-box{background:rgba(255,255,255,.06);padding:12px;border-radius:10px;margin:8px 0;font-family:var(--font);font-size:13px;line-height:1.6}
.info-box strong{color:var(--accent)}

.compass{width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,rgba(0,0,0,.3) 100%);border:2px solid rgba(255,255,255,.3);position:relative;margin:0 auto;transition:transform .2s ease-out}
.compass-direction{font-family:var(--font-display);position:absolute;font-weight:700;font-size:16px;color:white}
.compass-n{top:10px;left:50%;transform:translateX(-50%);color:#ef4444}
.compass-s{bottom:10px;left:50%;transform:translateX(-50%)}
.compass-e{right:10px;top:50%;transform:translateY(-50%)}
.compass-w{left:10px;top:50%;transform:translateY(-50%)}
.compass-center{position:absolute;top:50%;left:50%;width:12px;height:12px;background:white;border-radius:50%;transform:translate(-50%,-50%);z-index:2}

.level-bubble{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,rgba(0,0,0,.3) 100%);border:2px solid rgba(255,255,255,.3);position:relative;overflow:hidden;margin:0 auto}
.level-bubble::before{content:'';position:absolute;top:50%;left:50%;width:40px;height:40px;border:2px solid rgba(255,255,255,.3);border-radius:50%;transform:translate(-50%,-50%)}
.level-ball{position:absolute;top:50%;left:50%;width:28px;height:28px;background:radial-gradient(circle,#4ade80 0%,#16a34a 100%);border-radius:50%;transform:translate(-50%,-50%);transition:all .1s ease-out;box-shadow:0 0 20px rgba(74,222,128,.6)}

.calc-display{background:rgba(0,0,0,.4);padding:14px;border-radius:12px;text-align:right;font-family:var(--font-display);font-size:30px;font-weight:300;min-height:60px;word-break:break-all;margin-bottom:10px}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn{font-family:var(--font-display);padding:14px;background:rgba(255,255,255,.1);border:none;border-radius:10px;color:white;font-size:17px;cursor:pointer}
.calc-btn:active{background:rgba(255,255,255,.3)}
.calc-btn.op{background:rgba(74,222,128,.3)}
.calc-btn.eq{background:var(--accent);grid-column:span 2}
.calc-btn.clr{background:rgba(239,68,68,.3)}

.crypto-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,.08);border-radius:10px;margin-bottom:8px}
.crypto-info{display:flex;align-items:center;gap:10px}
.crypto-logo{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.crypto-name{font-family:var(--font-display);font-weight:600;font-size:13px}
.crypto-symbol{font-family:var(--font);font-size:11px;color:rgba(255,255,255,.7)}
.crypto-value{font-family:var(--font-display);font-size:15px;font-weight:600;text-align:right}
.crypto-change{font-family:var(--font-display);font-size:11px;text-align:right}
.crypto-change.up{color:#4ade80}
.crypto-change.down{color:#ef4444}

.battery-big{width:140px;height:70px;border:3px solid white;border-radius:10px;padding:5px;position:relative;margin:0 auto 12px}
.battery-big::after{content:'';position:absolute;right:-10px;top:15px;width:6px;height:35px;background:white;border-radius:0 4px 4px 0}
.battery-big-fill{height:100%;background:#4ade80;border-radius:4px;transition:width .5s,background .5s}

.counter-display{font-family:var(--font-display);font-size:80px;font-weight:200;text-align:center;padding:16px 0}
.counter-btn{width:70px;height:70px;border-radius:50%;border:none;font-size:28px;font-weight:700;cursor:pointer;color:white}
.counter-btn.plus{background:var(--accent)}
.counter-btn.minus{background:#ef4444}
.counter-btn.reset{background:rgba(255,255,255,.2);font-size:18px}

.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.mood-btn{aspect-ratio:1;background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:10px;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mood-btn.active{border-color:var(--accent);background:rgba(74,222,128,.15)}

.color-preview{width:100%;height:100px;border-radius:12px;margin-bottom:10px;border:2px solid rgba(255,255,255,.2)}
.color-values{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.color-val{font-family:var(--font-display);background:rgba(255,255,255,.08);padding:8px;border-radius:8px;text-align:center;font-size:12px}

.converter-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.converter-row input,.converter-row select{font-family:var(--font);flex:1;padding:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;font-size:13px}
.converter-result{font-family:var(--font-display);background:rgba(74,222,128,.2);padding:12px;border-radius:10px;text-align:center;font-size:18px;font-weight:600;margin-top:8px}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:10px}
.cal-head{font-family:var(--font);font-size:10px;text-align:center;color:rgba(255,255,255,.6);padding:4px 0;font-weight:600}
.cal-day{font-family:var(--font-display);aspect-ratio:1;background:rgba(255,255,255,.06);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.cal-day.today{background:var(--accent);font-weight:700}
.cal-day.other{opacity:.3}

.world-clock-item{background:rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.world-city{font-family:var(--font-display);font-size:14px;font-weight:600}
.world-zone{font-family:var(--font);font-size:11px;color:rgba(255,255,255,.6)}
.world-time{font-family:var(--font-display);font-size:20px;font-weight:600}

.contact-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;flex-shrink:0}

.rec-indicator{display:inline-block;width:12px;height:12px;background:#ef4444;border-radius:50%;animation:recPulse 1s infinite;margin-right:6px}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}

.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.icon-edit-btn{font-family:var(--font);aspect-ratio:1;background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;color:white;padding:6px 4px;position:relative}
.icon-edit-btn.custom{border-color:var(--accent);background:rgba(74,222,128,.1)}
.icon-edit-btn img,.icon-edit-btn svg{width:28px;height:28px;object-fit:contain}
.icon-reset-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:#ef4444;border:none;color:white;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}

.storage-bar{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:6px}
.storage-fill{height:100%;background:var(--accent);transition:width .3s,background .3s}
.storage-fill.warning{background:#fbbf24}
.storage-fill.danger{background:#ef4444}

.loading{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);backdrop-filter:blur(10px);padding:12px 20px;border-radius:20px;font-family:var(--font);font-size:13px;z-index:300;animation:toastIn .3s}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

@media (max-width:380px){
  .time{font-size:calc(95px * var(--scale))}
  .time.s-minimal{font-size:calc(80px * var(--scale))}
  .time.s-bold{font-size:calc(90px * var(--scale))}
  .weather-details{grid-template-columns:repeat(2,1fr)}
  .widgets-grid{grid-template-columns:repeat(4,1fr)}
  .widget-btn .w-icon{width:38px;height:38px}
  .app-title{font-size:calc(16px * var(--scale))}
  .icon-grid{grid-template-columns:repeat(3,1fr)}
}
@media (min-width:768px){
  .time{font-size:calc(150px * var(--scale))}
}
</style>
</head>
<body>
<div class="bg-gradient" id="bgGradient"></div>

      <div class="app-subtitle">Lock Screen & Utilities</div>
    </div>
  </div>
  <div class="clock-area">
    <div class="date" id="date">--</div>
    <div class="time" id="timeDisplay"><span id="hours">--</span><span class="colon">:</span><span id="minutes">--</span></div>
    <div class="analog-clock" id="analogClock">
      <div class="mark major" style="transform:translateX(-50%) rotate(0deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(30deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(60deg)"></div>
      <div class="mark major" style="transform:translateX(-50%) rotate(90deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(120deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(150deg)"></div>
      <div class="mark major" style="transform:translateX(-50%) rotate(180deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(210deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(240deg)"></div>
      <div class="mark major" style="transform:translateX(-50%) rotate(270deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(300deg)"></div>
      <div class="mark" style="transform:translateX(-50%) rotate(330deg)"></div>
      <div class="hand h-hour" id="handHour"></div>
      <div class="hand h-min" id="handMinute"></div>
      <div class="hand h-sec" id="handSecond"></div>
      <div class="center"></div>
    </div>
    <div class="flip-clock" id="flipClock">
      <div class="flip-unit"><div class="flip-num" id="flipH">00</div><div class="flip-label">ORE</div></div>
      <div class="flip-unit"><div class="flip-num" id="flipM">00</div><div class="flip-label">MIN</div></div>
      <div class="flip-unit"><div class="flip-num" id="flipS">00</div><div class="flip-label">SEC</div></div>
    </div>
  </div>
  <div class="weather-card">
    <div class="weather-city-row">
      <div class="weather-icon-small" id="weatherIcon">🌤️</div>
      <div class="weather-city" id="location">Rilevamento...</div>
    </div>
    <div class="weather-main">
      <div class="temp" id="temp">--°</div>
      <div class="desc" id="weatherDesc">Caricamento...</div>
    </div>
    <div class="weather-details">
      <div class="detail"><span class="detail-icon">💧</span><span class="detail-value" id="humidity">--%</span><span class="detail-label">Umidità</span></div>
      <div class="detail"><span class="detail-icon">💨</span><span class="detail-value" id="wind">-- km/h</span><span class="detail-label">Vento</span></div>
      <div class="detail"><span class="detail-icon">🌡️</span><span class="detail-value" id="feelsLike">--°</span><span class="detail-label">Percepita</span></div>
      <div class="detail"><span class="detail-icon">☀️</span><span class="detail-value" id="uvIndex">--</span><span class="detail-label">UV</span></div>
    </div>
  </div>
  <div class="widgets-grid" id="widgetsGrid"></div>
</div>
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Titolo</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

function compressImage(dataUrl, width, height, type, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL(type, quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

async function compressAllIcons(){
  const keys = Object.keys(prefs.customIcons || {});
  if(keys.length === 0) return false;
  for(const key of keys){
    const dataUrl = prefs.customIcons[key];
    if(!dataUrl || !dataUrl.startsWith('data:')) continue;
    try{prefs.customIcons[key] = await compressImage(dataUrl, 48, 48, 'image/jpeg', 0.7)}
    catch(err){delete prefs.customIcons[key]}
  }
  return true;
}

}

  openModal('📶 Stato Rete', '');

    try{

function openCompass(){
  openModal('🧭 Bussola', `<div style="text-align:center;padding:10px 0"><div class="compass" id="compass"><div class="compass-direction compass-n">N</div><div class="compass-direction compass-s">S</div><div class="compass-direction compass-e">E</div><div class="compass-direction compass-w">O</div><div class="compass-center"></div></div><div style="font-size:32px;font-weight:300;margin-top:16px" id="compassDeg">--°</div><div style="font-size:14px;color:rgba(255,255,255,.7);margin-top:4px" id="compassDir">Attivazione...</div></div>`);
  const compass = document.getElementById('compass');
  const degEl = document.getElementById('compassDeg');
  const dirEl = document.getElementById('compassDir');
  function getDirection(deg){const dirs = ['N','NE','E','SE','S','SO','O','NO'];return dirs[Math.round(deg/45)%8]}
  function handle(e){
    let h;
    if(e.webkitCompassHeading !== undefined) h = e.webkitCompassHeading;
    else if(e.alpha !== null) h = 360 - e.alpha;
    else {dirEl.textContent = 'Non disponibile';return}
    compass.style.transform = `rotate(${-h}deg)`;
    degEl.textContent = `${Math.round(h)}°`;
    dirEl.textContent = getDirection(h);
  }
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r === 'granted') window.addEventListener('deviceorientation', handle);else dirEl.textContent = 'Permesso negato'});
  } else if('DeviceOrientationEvent' in window){
    window.addEventListener('deviceorientation', handle);
    setTimeout(()=>{if(degEl.textContent === '--°') dirEl.textContent = 'Muovi il dispositivo'}, 1500);
  } else dirEl.textContent = 'Non supportato';
  modalCleanup = ()=>window.removeEventListener('deviceorientation', handle);
}

function openLevel(){
  openModal('📐 Livella', `<div style="text-align:center;padding:10px 0"><div class="level-bubble"><div class="level-ball" id="levelBall"></div></div><div style="display:flex;gap:20px;justify-content:center;margin-top:14px;font-size:16px"><div>β: <span id="levelBeta">0°</span></div><div>γ: <span id="levelGamma">0°</span></div></div></div>`);
  const ball = document.getElementById('levelBall');
  const betaEl = document.getElementById('levelBeta');
  const gammaEl = document.getElementById('levelGamma');
  function handle(e){
    const beta = e.beta || 0;const gamma = e.gamma || 0;
    const cB = Math.max(-45, Math.min(45, beta));const cG = Math.max(-45, Math.min(45, gamma));
    const offX = (cG/45)*70;const offY = (cB/45)*70;
    ball.style.transform = `translate(calc(-50% + ${offX}px), calc(-50% + ${offY}px))`;
    betaEl.textContent = `${beta.toFixed(1)}°`;gammaEl.textContent = `${gamma.toFixed(1)}°`;
    if(Math.abs(beta) < 2 && Math.abs(gamma) < 2){ball.style.background = 'radial-gradient(circle,#4ade80 0%,#16a34a 100%)';ball.style.boxShadow = '0 0 30px rgba(74,222,128,.9)'}
    else{ball.style.background = 'radial-gradient(circle,#fbbf24 0%,#f59e0b 100%)';ball.style.boxShadow = '0 0 20px rgba(251,191,36,.6)'}
  }
  if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r === 'granted') window.addEventListener('deviceorientation', handle)});

}

function openTimer(){
  openModal('⏲️ Timer', `<div id="timerSetup"><div style="display:flex;justify-content:center;gap:8px;margin:12px 0"><input type="number" id="tH" min="0" max="23" value="0" placeholder="H" style="width:60px;padding:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;font-size:18px;text-align:center"><input type="number" id="tM" min="0" max="59" value="5" placeholder="M" style="width:60px;padding:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;font-size:18px;text-align:center"><input type="number" id="tS" min="0" max="59" value="0" placeholder="S" style="width:60px;padding:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;font-size:18px;text-align:center"></div><button class="big-btn primary" style="width:100%" id="timerStart">Avvia</button></div><div id="timerRunning" style="display:none"><div class="big-display" id="timerDisplay">00:00:00</div><div class="btn-row"><button class="big-btn secondary" id="timerReset">Reset</button><button class="big-btn primary" id="timerPause">Pausa</button></div></div>`);
  let remaining = 0, timerRunning = false, timerEnd = 0, interval;
  const setupEl = document.getElementById('timerSetup');
  const runEl = document.getElementById('timerRunning');
  const display = document.getElementById('timerDisplay');
  document.getElementById('timerStart').addEventListener('click', ()=>{
    const h = +document.getElementById('tH').value || 0;
    const m = +document.getElementById('tM').value || 0;
    const s = +document.getElementById('tS').value || 0;
    remaining = (h*3600 + m*60 + s)*1000;
    if(remaining <= 0) return;
    timerEnd = Date.now() + remaining;timerRunning = true;
    setupEl.style.display = 'none';runEl.style.display = 'block';
    runTimer();interval = setInterval(runTimer, 100);
  });
  function runTimer(){
    const left = timerEnd - Date.now();
    if(left <= 0){display.textContent = '00:00:00';clearInterval(interval);timerRunning = false;showToast('⏰ Tempo scaduto!');return}
    const h = Math.floor(left/3600000);const m = Math.floor((left%3600000)/60000);const s = Math.floor((left%60000)/1000);
    display.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  document.getElementById('timerPause').addEventListener('click', (e)=>{
    if(timerRunning){remaining = timerEnd - Date.now();clearInterval(interval);timerRunning = false;e.target.textContent = 'Riprendi'}
    else{timerEnd = Date.now() + remaining;timerRunning = true;interval = setInterval(runTimer, 100);e.target.textContent = 'Pausa'}
  });
  document.getElementById('timerReset').addEventListener('click', ()=>{clearInterval(interval);timerRunning = false;setupEl.style.display = 'block';runEl.style.display = 'none'});
  modalCleanup = ()=>clearInterval(interval);

  let mode = 'work', duration = 25*60*1000, endTime = 0, running = false, cycles = 0, interval;
  const display = document.getElementById('pomoDisplay');
  const status = document.getElementById('pomoStatus');

  updateDisplay(duration);
  function tick(){
    const left = endTime - Date.now();

    updateDisplay(left);
  }
  document.getElementById('pomoStart').addEventListener('click', (e)=>{
    if(!running){running = true;endTime = Date.now() + duration;interval = setInterval(tick, 100);e.target.textContent = 'Pausa';status.textContent = mode === 'work' ? '🍅 Concentrazione...' : '⏸️ Pausa'}
    else{duration = endTime - Date.now();clearInterval(interval);running = false;e.target.textContent = 'Riprendi'}
  });
  document.getElementById('pomoReset').addEventListener('click', ()=>{clearInterval(interval);running = false;duration = mode === 'work' ? 25*60*1000 : mode === 'short' ? 5*60*1000 : 15*60*1000;updateDisplay(duration);document.getElementById('pomoStart').textContent = 'Start';status.textContent = 'Pronto'});

}

function openMoon(){
  const now = new Date();
  const nowutc = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()) / 1000;
  const phase = ((nowutc - 33862.5) / 86400) % 29.530588853;
  const phaseNorm = phase < 0 ? phase + 29.53 : phase;
  let phaseName, phaseEmoji;
  if(phaseNorm < 1.84566){phaseName='Luna Nuova';phaseEmoji='🌑'}
  else if(phaseNorm < 5.53699){phaseName='Luna Crescente';phaseEmoji='🌒'}
  else if(phaseNorm < 9.22831){phaseName='Primo Quarto';phaseEmoji='🌓'}
  else if(phaseNorm < 12.91963){phaseName='Gibbosa Crescente';phaseEmoji='🌔'}
  else if(phaseNorm < 16.61096){phaseName='Luna Piena';phaseEmoji='🌕'}
  else if(phaseNorm < 20.30228){phaseName='Gibbosa Calante';phaseEmoji='🌖'}
  else if(phaseNorm < 23.99361){phaseName='Ultimo Quarto';phaseEmoji='🌗'}
  else if(phaseNorm < 27.68493){phaseName='Luna Calante';phaseEmoji='🌘'}
  else {phaseName='Luna Nuova';phaseEmoji='🌑'}
  const illumination = Math.round((1 - Math.cos((phaseNorm/29.530588853)*2*Math.PI))/2*100);
  openModal('🌙 Fase Lunare', `<div style="text-align:center;padding:10px 0"><div style="font-size:100px">${phaseEmoji}</div><div style="font-size:22px;font-weight:600;margin-top:8px">${phaseName}</div><div style="font-size:14px;color:rgba(255,255,255,.7);margin-top:4px">Illuminazione: ${illumination}%</div><div class="info-box" style="text-align:left;margin-top:14px"><div><strong>Età lunare:</strong> ${phaseNorm.toFixed(1)} giorni</div><div><strong>Ciclo sinodico:</strong> 29.53 giorni</div><div><strong>Data:</strong> ${now.toLocaleDateString('it-IT')}</div></div></div>`);
}

function openCalendar(){
  const now = new Date();const year = now.getFullYear();const month = now.getMonth();const today = now.getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const startDay = firstDay === 0 ? 6 : firstDay - 1;
  const monthName = now.toLocaleDateString('it-IT', {month:'long', year:'numeric'});
  let days = '';
  ['L','M','M','G','V','S','D'].forEach(d=>days += `<div class="cal-head">${d}</div>`);
  for(let i=startDay-1;i>=0;i--) days += `<div class="cal-day other">${daysInPrevMonth-i}</div>`;
  for(let d=1;d<=daysInMonth;d++) days += `<div class="cal-day${d===today?' today':''}">${d}</div>`;
  const remaining = 42 - (startDay + daysInMonth);
  for(let d=1;d<=remaining;d++) days += `<div class="cal-day other">${d}</div>`;
  openModal('📅 Calendario', `<div style="text-align:center;font-size:18px;font-weight:600;text-transform:capitalize;margin-bottom:10px">${monthName}</div><div class="calendar-grid">${days}</div>`);
}

  openModal('🎤 Note Vocali', `<div style="text-align:center;margin-bottom:16px"><button class="big-btn primary" id="recStart" style="padding:16px 32px">🎤 Registra</button><div id="recStatus" style="margin-top:8px;font-size:13px;color:rgba(255,255,255,.7)">Pronto</div></div><div>${list || '<div style="text-align:center;color:rgba(255,255,255,.6);padding:16px">Nessuna registrazione</div>'}</div>`);
  document.querySelectorAll('.del-btn').forEach(b=>{b.addEventListener('click', function(){prefs.voiceNotes.splice(+this.dataset.idx, 1);savePrefs();renderVoiceNotes()})});
  let mediaRecorder, audioChunks = [];
  document.getElementById('recStart').addEventListener('click', async (e)=>{
    if(!mediaRecorder || mediaRecorder.state === 'inactive'){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder = new MediaRecorder(stream);audioChunks = [];
        mediaRecorder.ondataavailable = e=>audioChunks.push(e.data);
        mediaRecorder.onstop = ()=>{
          const blob = new Blob(audioChunks, {type:'audio/webm'});
          const reader = new FileReader();
          reader.onload = ev=>{
            prefs.voiceNotes.unshift({audio:ev.target.result, time:Date.now()});
            savePrefs();stream.getTracks().forEach(t=>t.stop());renderVoiceNotes();
          };
          reader.readAsDataURL(blob);
        };
        mediaRecorder.start();
        e.target.textContent = '⏹️ Stop';e.target.style.background = '#ef4444';
        document.getElementById('recStatus').innerHTML = '<span class="rec-indicator"></span>Registrazione...';
      }catch(err){showToast('❌ Microfono non disponibile')}
    } else {
      mediaRecorder.stop();
      e.target.textContent = '🎤 Registra';e.target.style.background = 'var(--accent)';
      document.getElementById('recStatus').textContent = 'Salvataggio...';
    }
  });
}

  const mainEl = document.getElementById('chronoMain');

  const startBtn = document.getElementById('chronoStart');
  function format(ms){const m = Math.floor(ms/60000);const s = Math.floor((ms%60000)/1000);const cs = Math.floor((ms%1000)/10);return {main:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, ms:`.${String(cs).padStart(2,'0')}`}}
  function update(){const total = elapsed + (running ? Date.now() - startTime : 0);const f = format(total);mainEl.textContent = f.main;msEl.textContent = f.ms}
  startBtn.addEventListener('click', ()=>{
    if(!running){running = true;startTime = Date.now();startBtn.textContent = 'Stop';startBtn.style.background = '#ef4444';interval = setInterval(update, 30)}
    else{running = false;elapsed += Date.now() - startTime;startBtn.textContent = 'Start';startBtn.style.background = 'var(--accent)';clearInterval(interval);update()}
  });
  document.getElementById('chronoReset').addEventListener('click', ()=>{running = false;elapsed = 0;clearInterval(interval);mainEl.textContent = '00:00';msEl.textContent = '.00';startBtn.textContent = 'Start';startBtn.style.background = 'var(--accent)'});

}

function openConverter(){
  const units = {
    length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.34,ft:0.3048,in:0.0254},
    weight:{kg:1,g:0.001,mg:0.000001,lb:0.453592,oz:0.0283495},
    temp:{c:'c',f:'f',k:'k'},
    volume:{l:1,ml:0.001,gal:3.78541,cup:0.24}
  };
  openModal('🔄 Convertitore', `<select id="convType" style="width:100%;padding:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;margin-bottom:10px"><option value="length">Lunghezza</option><option value="weight">Peso</option><option value="temp">Temperatura</option><option value="volume">Volume</option></select><div class="converter-row"><input type="number" id="convFrom" value="1"><select id="convUnitFrom"></select></div><div style="text-align:center;font-size:20px">↓</div><div class="converter-row"><select id="convUnitTo"></select></div><div class="converter-result" id="convResult">--</div>`);
  function updateUnits(){
    const type = document.getElementById('convType').value;
    const uFrom = document.getElementById('convUnitFrom');
    const uTo = document.getElementById('convUnitTo');
    const keys = Object.keys(units[type]);
    uFrom.innerHTML = keys.map(k=>`<option value="${k}">${k}</option>`).join('');
    uTo.innerHTML = keys.map((k,i)=>`<option value="${k}" ${i===1?'selected':''}>${k}</option>`).join('');
    convert();
  }
  function convert(){
    const type = document.getElementById('convType').value;
    const val = parseFloat(document.getElementById('convFrom').value) || 0;
    const from = document.getElementById('convUnitFrom').value;
    const to = document.getElementById('convUnitTo').value;
    let result;
    if(type === 'temp'){
      let c;
      if(from === 'c') c = val;else if(from === 'f') c = (val-32)*5/9;else c = val - 273.15;
      if(to === 'c') result = c;else if(to === 'f') result = c*9/5 + 32;else result = c + 273.15;
    } else result = val * units[type][from] / units[type][to];
    document.getElementById('convResult').textContent = `${val} ${from} = ${result.toFixed(4)} ${to}`;
  }
  document.getElementById('convType').addEventListener('change', updateUnits);
  document.getElementById('convFrom').addEventListener('input', convert);
  document.getElementById('convUnitFrom').addEventListener('change', convert);
  document.getElementById('convUnitTo').addEventListener('change', convert);
  updateUnits();
}

          document.getElementById('torchBtn').style.background = '#fbbf24';

      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  
  if(document.getElementById('removeBgBtn')){
    document.getElementById('removeBgBtn').addEventListener('click', ()=>{
      prefs.bgImage = null;prefs.bg = 'dynamic';savePrefs();applyBackground();
      closeModal();
    });
  }
  
  document.getElementById('compressAll').addEventListener('click', async ()=>{
    const ok = await compressAllIcons();
    if(ok){savePrefs();renderWidgets();openSettings();showToast('✅ Icone compresse!')}
    else{showToast('ℹ️ Nessuna icona da comprimere')}
  });
  
  document.getElementById('clearIcons').addEventListener('click', ()=>{
    if(confirm('Cancellare tutte le icone personalizzate?')){
      prefs.customIcons = {};savePrefs();renderWidgets();openSettings();showToast('🧹 Icone cancellate');
    }
  });
  
  document.getElementById('resetAll').addEventListener('click', ()=>{
    if(confirm('⚠️ Cancellare TUTTI i dati dell\'app? (note, todo, icone, sfondo)')){
      localStorage.clear();location.reload();
    }
  });
  
  const iconGrid = document.getElementById('iconGrid');
  let currentIconTarget = null;
  
  WIDGETS.forEach(w=>{
    const btn = document.createElement('button');
    const hasCustom = !!prefs.customIcons[w.id];
    btn.className = 'icon-edit-btn' + (hasCustom ? ' custom' : '');
    btn.innerHTML = `<div style="width:28px;height:28px">${hasCustom ? `<img src="${prefs.customIcons[w.id]}">` : DEFAULT_ICONS[w.id]}</div><div>${w.label}</div>${hasCustom ? '<button class="icon-reset-btn" data-reset="'+w.id+'" title="Ripristina default">✕</button>' : ''}`;
    btn.addEventListener('click', (e)=>{
      if(e.target.classList.contains('icon-reset-btn')) return;
      currentIconTarget = w.id;
      document.getElementById('iconFileInput').click();
    });
    iconGrid.appendChild(btn);
  });
  
  document.querySelectorAll('.icon-reset-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = btn.dataset.reset;
      delete prefs.customIcons[id];
      savePrefs();renderWidgets();showToast('🔄 Icona ripristinata');openSettings();
    });
  });
  
  document.getElementById('iconFileInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file || !currentIconTarget) return;
    if(file.size > 500 * 1024){showToast('⚠️ File troppo grande (max 500KB)');return}
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        canvas.width = 64;canvas.height = 64;
        canvas.getContext('2d').drawImage(img, 0, 0, 64, 64);
        prefs.customIcons[currentIconTarget] = canvas.toDataURL('image/jpeg', 0.8);
        const saved = savePrefs();
        if(saved){showToast('✅ Icona salvata!')}
        else{showToast('⚠️ Memoria quasi piena')}
        renderWidgets();openSettings();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function applyPrefs(){
  document.documentElement.style.setProperty('--font', prefs.font);
  document.documentElement.style.setProperty('--scale', prefs.scale);
  document.body.style.fontFamily = prefs.font;
  const timeDisplay = document.getElementById('timeDisplay');
  const analogClock = document.getElementById('analogClock');
  const flipClock = document.getElementById('flipClock');
  timeDisplay.className = 'time';
  timeDisplay.style.display = '';
  analogClock.classList.remove('active');
  flipClock.classList.remove('active');
  if(prefs.clockStyle === 'analog'){timeDisplay.style.display = 'none';analogClock.classList.add('active')}
  else if(prefs.clockStyle === 'flip'){timeDisplay.style.display = 'none';flipClock.classList.add('active')}
  else if(prefs.clockStyle !== 'digital'){timeDisplay.classList.add('s-' + prefs.clockStyle)}
  applyBackground();
}

function applyBackground(){
  const bgGradient = document.getElementById('bgGradient');
  const bgImage = document.getElementById('bgImage');
  if(prefs.bgImage){
    bgImage.style.backgroundImage = `url(${prefs.bgImage})`;
    bgImage.classList.add('visible');
    bgGradient.style.opacity = '0';
  } else {
    bgImage.classList.remove('visible');
    bgImage.style.backgroundImage = '';
    bgGradient.style.opacity = '1';
    if(prefs.bg === 'dynamic'){
      const h = new Date().getHours();
      let g;
      if(h >= 5 && h < 8) g = 'linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb)';
      else if(h >= 8 && h < 12) g = 'linear-gradient(135deg,#4facfe,#00f2fe)';
      else if(h >= 12 && h < 17) g = 'linear-gradient(135deg,#43e97b,#38f9d7)';
      else if(h >= 17 && h < 20) g = 'linear-gradient(135deg,#fa709a,#fee140)';
      else if(h >= 20 && h < 23) g = 'linear-gradient(135deg,#667eea,#764ba2)';
      else g = 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)';
      bgGradient.style.backgroundImage = g;
    } else if(BG_PRESETS[prefs.bg]) bgGradient.style.backgroundImage = BG_PRESETS[prefs.bg];
  }
}

function updateClock(){
  const now = new Date();
  const h = now.getHours();const m = now.getMinutes();const s = now.getSeconds();
  const hStr = String(h).padStart(2,'0');const mStr = String(m).padStart(2,'0');const sStr = String(s).padStart(2,'0');
  document.getElementById('hours').textContent = hStr;
  document.getElementById('minutes').textContent = mStr;
  if(prefs.clockStyle === 'analog'){
    const hourDeg = (h%12)*30 + m*0.5;const minDeg = m*6 + s*0.1;const secDeg = s*6;
    document.getElementById('handHour').style.transform = `rotate(${hourDeg}deg)`;
    document.getElementById('handMinute').style.transform = `rotate(${minDeg}deg)`;
    document.getElementById('handSecond').style.transform = `rotate(${secDeg}deg)`;
  }
  if(prefs.clockStyle === 'flip'){
    document.getElementById('flipH').textContent = hStr;
    document.getElementById('flipM').textContent = mStr;
    document.getElementById('flipS').textContent = sStr;
  }
  const opts = {weekday:'long',day:'numeric',month:'long'};
  document.getElementById('date').textContent = now.toLocaleDateString('it-IT', opts);
}
setInterval(updateClock, 1000);
updateClock();

async function loadWeather(lat, lon){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=uv_index_max&timezone=auto&forecast_days=1`;
    const res = await fetch(url);
    if(!res.ok) throw new Error();
    const data = await res.json();
    const c = data.current;const d = data.daily;
    const wmo = WMO_CODES[c.weather_code] || {d:'N/D',i:'🌤️'};
    document.getElementById('weatherIcon').textContent = wmo.i;
    document.getElementById('weatherDesc').textContent = wmo.d;
    document.getElementById('temp').textContent = `${Math.round(c.temperature_2m)}°`;
    document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
    document.getElementById('wind').textContent = `${Math.round(c.wind_speed_10m)} km/h`;
    document.getElementById('feelsLike').textContent = `${Math.round(c.apparent_temperature)}°`;
    document.getElementById('uvIndex').textContent = d.uv_index_max[0] !== undefined ? Math.round(d.uv_index_max[0]) : '--';
  }catch(e){document.getElementById('weatherDesc').textContent = 'Errore'}
}

async function getLocationAndWeather(){
  if(!navigator.geolocation){document.getElementById('location').textContent = 'Non disponibile';loadWeather(41.9028, 12.4964);return}
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const {latitude, longitude} = pos.coords;
    try{
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=it`);
      const geoData = await geoRes.json();
      const city = geoData.address.city || geoData.address.town || geoData.address.village || 'Posizione';
      document.getElementById('location').textContent = city;
    }catch(e){document.getElementById('location').textContent = `${latitude.toFixed(2)}°, ${longitude.toFixed(2)}°`}
    loadWeather(latitude, longitude);
  }, ()=>{document.getElementById('location').textContent = 'Roma';loadWeather(41.9028, 12.4964)}, {enableHighAccuracy:true, timeout:10000});
}
getLocationAndWeather();

renderWidgets();
applyPrefs();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW error:', err));
  });
}
</script>
